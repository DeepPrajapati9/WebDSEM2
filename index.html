<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        form {
            text-align: center;
            width:300px;
            height: auto;
            border:1px solid;
            background-color: aqua;
            color: black;
            margin:auto;
        }
        h1 {
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Feedback Form</h1>
    <form>
        <label for="">Enter Your Name :</label>
        <input type="text" placeholder="Enter Name">
        <br>
        <label for="">Enter Your Email :</label>
        <input type="email" placeholder="Enter email">
        <br>
        <label for="">Rating :</label>
        <input type="number" max="5" min="1" placeholder="rating">
        <br>
        <textarea name="" id="" rows="3" cols="10"></textarea>
        <br>
        <button>Submit</button>
    </form>
    
</body>
</html>
