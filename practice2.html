<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> form</title>
</head>
<body>
    <form action="">
        <h1>payment form</h1>
        <h2>payment information</h2>
        <p>name: <input type="text" name="name" required></p>
       <fieldset> <legend>gender</legend><p>male <input type="radio" name="gender" id="gender"></p>
        <p>female <input type="radio" name="gender" id="gender"></p></fieldset>
        <p>address <textarea name="address" id="address" cols="100" rows="10"></textarea></p>
        <h2>payment method</h2>
        <p>card type:
            <select name="card type" id="card type">
                <option value="">select a card type</option>
                <option value="visa">visa</option>
                <option value="rupay">rupay</option>
            </select>
        </p>
        <p>expiry date: <input type="date"></p>
        <input type="submit" value="pay now">
    </form>

    
</body>
</html>
